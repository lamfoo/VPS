{% extends 'base.html' %}

{% block title %}Meus Pedidos - CloudHost Pro{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <h1 class="h3 mb-4">Meus Pedidos</h1>
        </div>
    </div>
    
    <div class="card">
        <div class="card-body text-center py-5">
            <i class="bi bi-cart display-1 text-muted opacity-50"></i>
            <h4 class="mt-3 text-muted">Nenhum pedido encontrado</h4>
            <p class="text-muted">Você ainda não fez nenhum pedido.</p>
            <a href="{% url 'vps:packages' %}" class="btn btn-primary">Fazer Primeiro Pedido</a>
        </div>
    </div>
</div>
{% endblock %}
