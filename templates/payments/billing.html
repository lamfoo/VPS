{% extends 'base.html' %}

{% block title %}Faturamento - CloudHost Pro{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <h1 class="h3 mb-4">Faturamento</h1>
        </div>
    </div>
    
    <div class="row">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">Resumo Financeiro</h5>
                </div>
                <div class="card-body text-center py-5">
                    <i class="bi bi-credit-card display-1 text-muted opacity-50"></i>
                    <h4 class="mt-3 text-muted">Nenhuma cobrança ativa</h4>
                    <p class="text-muted">Você não possui serviços ativos no momento.</p>
                    <a href="{% url 'vps:packages' %}" class="btn btn-primary">Contratar Hospedagem</a>
                </div>
            </div>
        </div>
        
        <div class="col-lg-4">
            <div class="card">
                <div class="card-header">
                    <h6 class="card-title mb-0">Próximas Cobranças</h6>
                </div>
                <div class="card-body text-center py-4">
                    <p class="text-muted">Nenhuma cobrança pendente</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
